{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="container">
    <div class="auth-form">
        <h2><span data-ar="إنشاء حساب جديد" data-en="Create New Account">Create New Account</span></h2>
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label><span data-ar="اسم المستخدم" data-en="Username">Username</span></label>
                {{ form.username }}
            </div>
            <div class="form-group">
                <label><span data-ar="البريد الإلكتروني" data-en="Email">Email</span></label>
                {{ form.email }}
            </div>
            <div class="form-group">
                <label><span data-ar="رقم الهاتف" data-en="Phone Number">Phone Number</span></label>
                {{ form.phone }}
            </div>
            <div class="form-group">
                <label><span data-ar="كلمة المرور" data-en="Password">Password</span></label>
                {{ form.password1 }}
            </div>
            <div class="form-group">
                <label><span data-ar="تأكيد كلمة المرور" data-en="Confirm Password">Confirm Password</span></label>
                {{ form.password2 }}
            </div>
            {% if form.errors %}
                <div class="form-errors">
                    {{ form.errors }}
                </div>
            {% endif %}
            <button type="submit" class="btn btn-primary"><span data-ar="إنشاء حساب" data-en="Create Account">Create Account</span></button>
        </form>
        <p class="auth-link"><span data-ar="لديك حساب؟" data-en="Have an account?">Have an account?</span> <a href="{% url 'login' %}"><span data-ar="سجل دخول" data-en="Login">Login</span></a></p>
    </div>
</div>
{% endblock %}
